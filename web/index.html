<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Real-Time Commander Web Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="demo controls">
        <div class="title-block">
          <p class="eyebrow">1.0 visual proof</p>
          <h1>自然语言指挥如何改变战术行为</h1>
        </div>
        <div class="run-controls">
          <button id="playPause" type="button" aria-label="播放或暂停">暂停</button>
          <button id="restart" type="button" aria-label="重新播放">重播</button>
        </div>
      </section>

      <section class="command-strip" aria-label="quick command buttons">
        <button class="preset-button" type="button" data-command="优先集火残血目标，前排顶住，中后排别乱冲。">集火残血</button>
        <button class="preset-button" type="button" data-command="全员原地不动，等对方过来，进入射程再开火。">原地等</button>
        <button class="preset-button" type="button" data-command="所有人冲出去，不管阵型，直接追对面后排。">猛冲</button>
        <button class="preset-button" type="button" data-command="全员趴下，不许开火。">趴下</button>
        <button class="preset-button" type="button" data-command="今天天气不错。">闲聊</button>
      </section>

      <section class="live-command" aria-label="live llm command">
        <input
          id="liveCommandInput"
          type="text"
          value="前排顶住，中后排别冲，优先集火残血。"
          aria-label="输入自然语言命令"
        />
        <button id="runLiveCommand" type="button">LLM 解析并播放</button>
        <span id="apiStatus" class="api-status">检测 API...</span>
      </section>

      <section class="battle-stage" aria-label="battle visualizer">
        <canvas id="battleCanvas" width="1100" height="620"></canvas>
      </section>

      <section class="status-grid" aria-label="current state">
        <div class="readout">
          <span class="label">玩家输入</span>
          <strong id="commandText"></strong>
        </div>
        <div class="readout">
          <span class="label">LLM policy</span>
          <strong id="policyText"></strong>
        </div>
        <div class="readout">
          <span class="label">当前 tick</span>
          <strong id="tickText"></strong>
        </div>
        <div class="readout">
          <span class="label">1000 局结果</span>
          <strong id="resultText"></strong>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
